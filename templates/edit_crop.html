{% extends "base.html" %}

{% block title %}Edit Crop - CropTracker{% endblock %}

{% block content %}
<h1 class="page-title">✏️ Edit Crop</h1>

<form method="POST" action="{{ url_for('edit_crop', crop_id=crop.id) }}">
    <div class="form-group">
        <label for="name">Crop Name</label>
        <input 
            type="text" 
            id="name" 
            name="name" 
            value="{{ crop.name }}"
            placeholder="e.g., Maize, Beans, Tomato"
            required
        >
    </div>

    <div class="form-group">
        <label for="planting_date">Planting Date</label>
        <input 
            type="date" 
            id="planting_date" 
            name="planting_date"
            value="{{ crop.planting_date.strftime('%Y-%m-%d') }}"
            required
        >
    </div>

    <div class="form-group">
        <label for="status">Status</label>
        <select id="status" name="status" required>
            {% for choice in status_choices %}
                <option value="{{ choice }}" {% if choice == crop.status %}selected{% endif %}>
                    {{ choice }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-buttons">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        <input type="submit" value="Update Crop">
    </div>
</form>
{% endblock %}
